<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lotus</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e1116;
        --panel: #161b22;
        --text: #e6edf3;
        --muted: #8b949e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid #21262d;
      }
      header h1 { font-size: 15px; margin: 0; font-weight: 600; }
      header .sym { color: var(--muted); }
      #grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 16px;
      }
      .tile {
        background: var(--panel);
        border: 1px solid #21262d;
        border-radius: 8px;
        padding: 8px;
      }
      .tile .chart { width: 100%; height: 420px; }
      .tile .status { color: var(--muted); padding: 4px 6px; min-height: 18px; }
      footer {
        padding: 8px 16px;
        color: var(--muted);
        border-top: 1px solid #21262d;
      }
      footer a { color: var(--muted); }
    </style>
  </head>
  <body>
    <header>
      <h1>Lotus</h1>
      <span class="sym">data & backtest inspection (optional viz)</span>
    </header>
    <main id="grid"></main>
    <!-- TradingView attribution is required by the Lightweight Charts license (§11). -->
    <footer>
      Charts by
      <a href="https://www.tradingview.com" target="_blank" rel="noopener">TradingView</a>
      — Lightweight Charts™
    </footer>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
